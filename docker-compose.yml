version: "3.8"

services:
  app:
    build: .
    container_name: laval-digital
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./tenants:/app/tenants
      - ./logs:/app/logs
      - ./content:/app/content
      - ./backups:/app/backups
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/health"]
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    build: .
    container_name: laval-digital-backup
    restart: unless-stopped
    volumes:
      - ./tenants:/app/tenants
      - ./backups:/app/backups
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "while true; do
        python scripts/backup.py;
        sleep 86400;
      done"
