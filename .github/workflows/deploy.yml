name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH }}

      - name: Add host key and deploy
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=3 ${{ secrets.USERNAME }}@${{ secrets.DROPLET_IP }} '
            set -e
            cd /home/bogdan/apps/laval-digital
            git pull
            docker compose up -d --build
            docker image prune -f

            # Write proxy block and sed script to temp files (heredocs avoid quoting issues)
            cat > /tmp/proxy.conf << \EOF
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
EOF
            cat > /tmp/proxy.sed << \EOF
/^server_name laval.digital www.laval.digital;/,/^}/{
    /^}/{
        r /tmp/proxy.conf
        a\
}
        d
    }
}
EOF
            # Copy into SWAG and inject before server block closing brace, if not already present
            if ! grep -q "proxy_pass http://127.0.0.1:5000" /home/bogdan/apps/nginx-conf/nginx/site-confs/default.conf 2>/dev/null; then
              docker cp /tmp/proxy.conf swag:/tmp/proxy.conf
              docker cp /tmp/proxy.sed swag:/tmp/proxy.sed
              docker exec swag sed -i -f /tmp/proxy.sed /config/nginx/site-confs/default.conf
              echo "Added proxy config to SWAG default.conf"
            else
              echo "Proxy config already present in SWAG default.conf"
            fi
            rm -f /tmp/proxy.conf /tmp/proxy.sed
            # Clean up old standalone config file
            rm -f /home/bogdan/apps/nginx-conf/nginx/site-confs/laval-digital.conf
            docker exec swag nginx -s reload || true
          '