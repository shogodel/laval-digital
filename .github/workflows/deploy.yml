name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH }}

      - name: Add host key and deploy
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -o ServerAliveCountMax=3 ${{ secrets.USERNAME }}@${{ secrets.DROPLET_IP }} '
            set -e
            cd /home/bogdan/apps/laval-digital
            git pull
            docker compose up -d --build
            docker image prune -f

            # Detect Docker gateway IP (host IP reachable from containers)
            HOST_IP=$(docker exec swag sh -c "ip route 2>/dev/null || true" | awk "/default/ {print \$3}")
            HOST_IP=${HOST_IP:-172.17.0.1}
            TARGET="http://${HOST_IP}:5000"

            # Replace proxy_pass in the existing laval.digital server block
            if grep -q "$TARGET" /home/bogdan/apps/nginx-conf/nginx/site-confs/default.conf 2>/dev/null; then
              echo "Proxy already points to $TARGET"
            else
              docker exec swag sed -i "/server_name laval.digital;/,/^}/s|proxy_pass http://laval:8000;|proxy_pass $TARGET;|" /config/nginx/site-confs/default.conf
              echo "Updated proxy_pass to $TARGET"
            fi

            # Clean up old standalone config file
            rm -f /home/bogdan/apps/nginx-conf/nginx/site-confs/laval-digital.conf

            # Test config and reload
            docker exec swag nginx -t && docker exec swag nginx -s reload || echo "nginx reload skipped (non-fatal)"
          '
