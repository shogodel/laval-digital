<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2b45"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D42B2B"/>
      <stop offset="100%" stop-color="#A82323"/>
    </linearGradient>
  </defs>
  <!-- Body/head rounded hexagon -->
  <rect x="25" y="40" width="150" height="130" rx="28" fill="url(#bg)" stroke="#D42B2B" stroke-width="3"/>
  <!-- Antenna -->
  <rect x="94" y="18" width="12" height="22" rx="6" fill="#D42B2B"/>
  <circle cx="100" cy="14" r="8" fill="url(#glow)"/>
  <circle cx="100" cy="14" r="3" fill="#fff" opacity="0.6"/>
  <!-- Eyes -->
  <ellipse cx="72" cy="95" rx="18" ry="20" fill="#fff"/>
  <ellipse cx="128" cy="95" rx="18" ry="20" fill="#fff"/>
  <circle cx="72" cy="95" r="10" fill="#D42B2B"/>
  <circle cx="128" cy="95" r="10" fill="#D42B2B"/>
  <circle cx="68" cy="90" r="4" fill="#fff" opacity="0.7"/>
  <circle cx="124" cy="90" r="4" fill="#fff" opacity="0.7"/>
  <!-- Smile -->
  <path d="M70 130 Q100 150 130 130" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheek dots -->
  <circle cx="52" cy="118" r="5" fill="#D42B2B" opacity="0.25"/>
  <circle cx="148" cy="118" r="5" fill="#D42B2B" opacity="0.25"/>
</svg>
