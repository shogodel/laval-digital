<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Hub — Laval Digital</title>
    <meta name="description" content="Master your AI marketing suite with step-by-step guides, tutorials, and training articles.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" nonce="{{ csp_nonce }}">
    <style nonce="{{ csp_nonce }}">
        :root {
            --navy: #0f2b45; --red: #D42B2B; --red-dark: #A82323; --green: #059669;
            --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
            --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-900: #111827; --white: #ffffff; --radius: 8px; --radius-lg: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-900); }
        .top-nav { background: var(--navy); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .top-nav .brand { display: flex; align-items: center; gap: 10px; color: var(--white); text-decoration: none; font-weight: 700; }
        .top-nav .brand img { height: 32px; }
        .top-nav ul { list-style: none; display: flex; gap: 4px; }
        .top-nav ul li a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 8px 14px; border-radius: var(--radius); transition: all 0.15s; }
        .top-nav ul li a:hover { color: var(--white); background: rgba(255,255,255,0.1); }
        .hamburger { display: none; background: none; border: none; color: var(--white); font-size: 1.5rem; cursor: pointer; }
        .hero { background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%); color: var(--white); padding: 60px 24px; text-align: center; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
        .hero p { font-size: 1.1rem; color: rgba(255,255,255,0.75); max-width: 600px; margin: 0 auto 28px; line-height: 1.6; }
        .search-box { max-width: 500px; margin: 0 auto; display: flex; gap: 0; }
        .search-box input { flex: 1; padding: 14px 18px; font-size: 1rem; border: none; border-radius: var(--radius) 0 0 var(--radius); outline: none; font-family: inherit; }
        .search-box button { padding: 14px 24px; background: var(--red); color: var(--white); border: none; border-radius: 0 var(--radius) var(--radius) 0; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.95rem; }
        .search-box button:hover { background: var(--red-dark); }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; padding: 28px 0 20px; }
        .filter-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--gray-300); background: var(--white); color: var(--gray-600); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .filter-btn:hover { border-color: var(--red); color: var(--red); }
        .filter-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
        .section-title { font-size: 1.4rem; font-weight: 700; margin: 32px 0 20px; color: var(--gray-900); }
        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .article-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--gray-200); padding: 24px; transition: box-shadow 0.2s, transform 0.2s; cursor: pointer; text-decoration: none; display: block; color: inherit; }
        .article-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .article-card .icon { font-size: 2rem; margin-bottom: 12px; }
        .article-card h3 { font-size: 1.05rem; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; line-height: 1.4; }
        .article-card p { font-size: 0.85rem; color: var(--gray-500); line-height: 1.6; margin-bottom: 12px; }
        .article-card .meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--gray-400); }
        .article-card .cat-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; background: var(--gray-100); color: var(--gray-600); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); grid-column: 1 / -1; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state p { font-size: 1rem; }
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .top-nav ul { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background: var(--navy); padding: 12px; z-index: 10; }
            .top-nav ul.open { display: flex; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 0.95rem; }
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="{{ url_for('home') }}" class="brand"><img src="{{ url_for('static', filename=logo_file) }}" alt="Laval Digital"> <span>Laval Digital</span></a>
        <button class="hamburger" id="hamburger-btn">☰</button>
        <ul id="nav-menu">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('demo') }}">Live Demo</a></li>
            <li><a href="{{ url_for('blog') }}">Blog</a></li>
            <li><a href="{{ url_for('training.training_hub') }}" class="active">Training</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>Master Your AI Marketing Suite</h1>
        <p>Step-by-step guides to get the most from your AI agents, dashboard, and tools. Learn at your own pace.</p>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search training articles...">
            <button id="search-btn">Search</button>
        </div>
    </section>

    <div class="container">
        <div class="filters" id="category-filters">
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="getting-started">Getting Started</button>
            <button class="filter-btn" data-cat="api-setup">API Setup</button>
            <button class="filter-btn" data-cat="seo">SEO</button>
            <button class="filter-btn" data-cat="social-media">Social Media</button>
            <button class="filter-btn" data-cat="analytics">Analytics</button>
            <button class="filter-btn" data-cat="troubleshooting">Troubleshooting</button>
        </div>

        <h2 class="section-title" id="section-title">All Articles</h2>

        <div class="article-grid" id="article-grid"></div>
    </div>

    <script nonce="{{ csp_nonce }}">
    const ARTICLES = {{ articles | tojson }};

    function renderArticles(list) {
        const grid = document.getElementById('article-grid');
        if (!list.length) {
            grid.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>No articles match your search. Try a different term or category.</p></div>';
            return;
        }
        grid.innerHTML = list.map(a => `
            <a class="article-card" href="/training/${escapeHtml(a.slug)}">
                <div class="icon">${escapeHtml(a.icon || '📖')}</div>
                <h3>${escapeHtml(a.title)}</h3>
                <p>${escapeHtml(a.description)}</p>
                <div class="meta">
                    <span>${escapeHtml(a.read_time)} min read</span>
                    <span class="cat-tag">${escapeHtml(a.category_label || a.category)}</span>
                </div>
            </a>
        `).join('');
    }

    function filterArticles() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const activeCat = document.querySelector('.filter-btn.active')?.dataset.cat || 'all';
        const filtered = ARTICLES.filter(a => {
            const matchCat = activeCat === 'all' || a.category === activeCat;
            const matchSearch = !query || a.title.toLowerCase().includes(query) || a.description.toLowerCase().includes(query) || (a.tags || []).some(t => t.toLowerCase().includes(query));
            return matchCat && matchSearch;
        });
        document.getElementById('section-title').textContent = activeCat === 'all' ? 'All Articles' : document.querySelector(`.filter-btn[data-cat="${activeCat}"]`).textContent;
        renderArticles(filtered);
    }

    function setFilter(cat) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.filter-btn[data-cat="${cat}"]`).classList.add('active');
        filterArticles();
    }

    document.getElementById('hamburger-btn').addEventListener('click', function() {
        document.getElementById('nav-menu').classList.toggle('open');
    });
    document.getElementById('search-btn').addEventListener('click', filterArticles);
    document.getElementById('search-input').addEventListener('input', filterArticles);
    document.getElementById('category-filters').addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (btn) setFilter(btn.dataset.cat);
    });

    renderArticles(ARTICLES);
    </script>
</body>
</html>
