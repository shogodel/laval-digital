<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Laval Digital</title>
    <meta name="description" content="Get in touch with Laval Digital for managed Frankie AI services or custom website builds.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--off-white, #f7f8fa); color: #1f2937; min-height: 100vh; display: flex; flex-direction: column; }
        :root { --navy: #0f2b45; --navy-light: #1a3a5c; --orange: #D42B2B; --orange-dark: #A82323; --orange-glow: rgba(212,43,43,0.15); --white: #ffffff; }
        .container { max-width: 1040px; margin: 0 auto; padding: 0 24px; width: 100%; }
        header { background: var(--navy); padding: 16px 0; }
        header .container { display: flex; align-items: center; justify-content: space-between; }
        header .logo { color: var(--white); font-size: 22px; font-weight: 800; text-decoration: none; letter-spacing: -0.5px; }
        header .logo span { color: var(--orange); }
        header nav a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; margin-left: 24px; }
        header nav a:hover { color: var(--white); }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
        .card { background: var(--white); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px; max-width: 560px; width: 100%; }
        .card h1 { font-size: 28px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
        .card p.subtitle { color: #6b7280; font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 15px; font-family: inherit; transition: border-color 0.2s; outline: none; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-glow); }
        .form-group .error { color: var(--orange); font-size: 13px; margin-top: 4px; display: none; }
        .btn-primary { width: 100%; padding: 14px; background: var(--orange); color: var(--white); border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.15s; }
        .btn-primary:hover { background: var(--orange-dark); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .flash { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
        .flash.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .flash.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
        footer { text-align: center; padding: 24px; font-size: 13px; color: #9ca3af; }
        .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-text { display: inline; } .btn-primary.loading .btn-text { display: none; } .btn-primary.loading .spinner { display: block; }
        @media (max-width: 540px) { .card { padding: 32px 24px; } }
    </style>
</head>
<body>
<header>
    <div class="container">
        <a href="/" class="logo">LAVAL <span>DIGITAL</span></a>
        <nav>
            <a href="/">Home</a>
            <a href="/demo">Demo</a>
            <a href="/free-trial">Free Trial</a>
        </nav>
    </div>
</header>

<div class="main">
    <div class="card">
        <h1>Get in Touch</h1>
        <p class="subtitle">Interested in our Managed For You service or a custom website? Fill out the form below and we'll get back to you within 24 hours.</p>

        <div id="flash" class="flash"></div>

        <form id="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required autocomplete="name" placeholder="e.g. Sarah Johnson">
                <div class="error" id="name-error"></div>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="sarah@mybusiness.ca">
                <div class="error" id="email-error"></div>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="(514) 555-1234">
                <div class="error" id="phone-error"></div>
            </div>
            <div class="form-group">
                <label for="service">Service Interested In</label>
                <select id="service" name="service" required>
                    <option value="">Select a service...</option>
                    <option value="managed">Managed For You — $897.99/mo</option>
                    <option value="website">Custom Website — From $999</option>
                    <option value="both">Both Services</option>
                    <option value="other">Other / General Inquiry</option>
                </select>
                <div class="error" id="service-error"></div>
            </div>
            <div class="form-group">
                <label for="message">Message (Optional)</label>
                <textarea id="message" name="message" placeholder="Tell us about your business and what you need..."></textarea>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
                <span class="btn-text">Send Message</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>
</div>

<footer>&copy; 2026 Laval Digital. All rights reserved.</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const flash = document.getElementById('flash');
    flash.className = 'flash';
    flash.style.display = 'none';

    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !phone) {
        flash.textContent = 'Name and phone are required.';
        flash.className = 'flash error';
        return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
        const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                phone: phone,
                service: document.getElementById('service').value,
                urgency: ''
            })
        });

        if (res.ok) {
            flash.textContent = 'Thank you! We\'ll be in touch within 24 hours.';
            flash.className = 'flash success';
            document.getElementById('contact-form').reset();
        } else {
            const data = await res.json();
            flash.textContent = data.error || 'Something went wrong. Please try again.';
            flash.className = 'flash error';
        }
    } catch (err) {
        flash.textContent = 'Network error. Please check your connection and try again.';
        flash.className = 'flash error';
    } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
    }
});
</script>
</body>
</html>
