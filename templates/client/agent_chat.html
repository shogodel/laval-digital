<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ agent_name }} — Laval Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0f2b45; --navy-light: #1a3a5c; --red: #D42B2B; --red-dark: #A82323;
            --green: #059669; --green-bg: #ecfdf5; --amber: #d97706; --amber-bg: #fffbeb;
            --blue: #2563eb; --blue-bg: #eff6ff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
            --gray-600: #4b5563; --gray-700: #374151; --gray-900: #111827; --white: #ffffff;
            --radius: 8px; --radius-lg: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }
        html, body { height: 100%; }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--gray-900); display: flex; flex-direction: column; overflow: hidden; }
        a { color: inherit; text-decoration: none; }

        /* ── Top Nav ── */
        .nav { background: var(--navy); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; gap: 12px; }
        .nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .nav-left a { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; padding: 6px 12px; border-radius: var(--radius); transition: all 0.12s; white-space: nowrap; }
        .nav-left a:hover { background: rgba(255,255,255,0.1); color: var(--white); }
        .nav-center { text-align: center; min-width: 0; }
        .nav-center h2 { font-size: 1rem; font-weight: 700; color: var(--white); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .nav-center .sub { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 1px; }
        .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .nav-right .model-badge { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 20px; color: rgba(255,255,255,0.7); }

        /* ── Layout ── */
        .chat-layout { display: flex; flex: 1; overflow: hidden; }

        /* ── Sidebar ── */
        .sidebar { width: 240px; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .sidebar-header span { font-size: 0.8rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; }
        .sidebar-header .new-btn { background: var(--red); color: var(--white); border: none; border-radius: var(--radius); padding: 5px 14px; font-size: 0.78rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
        .sidebar-header .new-btn:hover { background: var(--red-dark); }
        .thread-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--gray-100); transition: background 0.1s; }
        .thread-item:hover { background: var(--gray-50); }
        .thread-item.active { background: var(--blue-bg); border-left: 3px solid var(--blue); }
        .thread-item .preview { font-size: 0.82rem; color: var(--gray-700); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .thread-item .date { font-size: 0.7rem; color: var(--gray-400); margin-top: 3px; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--gray-200); text-align: center; margin-top: auto; }
        .sidebar-footer a { font-size: 0.8rem; color: var(--gray-500); font-weight: 500; transition: color 0.12s; }
        .sidebar-footer a:hover { color: var(--red); }

        /* ── Chat Main ── */
        .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
        .message { max-width: 78%; padding: 12px 18px; border-radius: 16px; font-size: 0.92rem; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; position: relative; }
        .message .time { font-size: 0.65rem; color: var(--gray-400); margin-top: 6px; opacity: 0; transition: opacity 0.15s; }
        .message:hover .time { opacity: 1; }
        .message.user { align-self: flex-end; background: #e8f0fe; color: var(--gray-900); border-bottom-right-radius: 4px; }
        .message.user .time { text-align: right; }
        .message.agent { align-self: flex-start; background: var(--white); color: var(--gray-900); box-shadow: var(--shadow); border: 1px solid var(--gray-200); border-bottom-left-radius: 4px; }
        .message.agent .msg-label { font-size: 0.72rem; font-weight: 600; color: var(--gray-500); margin-bottom: 3px; }
        .empty-chat { text-align: center; padding: 60px 20px; color: var(--gray-400); margin: auto; }
        .empty-chat .icon { font-size: 3rem; margin-bottom: 8px; }
        .empty-chat p { font-size: 0.95rem; margin-top: 6px; }
        .empty-chat .hint { font-size: 0.82rem; color: var(--gray-400); margin-top: 4px; }
        .typing { align-self: flex-start; display: flex; gap: 5px; padding: 14px 18px; background: var(--white); border: 1px solid var(--gray-200); border-radius: 16px; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
        .typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-400); animation: bounce 1.3s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        /* ── Input ── */
        .input-area { padding: 16px 24px; background: var(--white); border-top: 1px solid var(--gray-200); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
        .input-wrap { flex: 1; position: relative; display: flex; align-items: flex-end; gap: 8px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 20px; padding: 4px 4px 4px 16px; transition: border-color 0.15s; }
        .input-wrap:focus-within { border-color: var(--blue); background: var(--white); }
        .input-wrap textarea { flex: 1; padding: 10px 0; font-size: 0.92rem; font-family: inherit; border: none; background: transparent; outline: none; resize: none; min-height: 24px; max-height: 100px; line-height: 1.5; }
        .input-wrap .send-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--red); color: var(--white); font-size: 1.1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
        .input-wrap .send-btn:hover { background: var(--red-dark); }
        .input-wrap .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .char-count { font-size: 0.7rem; color: var(--gray-400); text-align: right; padding: 2px 16px 0 0; }

        /* ── Error ── */
        .error-msg { align-self: center; background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius-lg); padding: 12px 20px; text-align: center; max-width: 400px; }
        .error-msg p { font-size: 0.85rem; color: #991b1b; margin-bottom: 8px; }
        .error-msg .retry-btn { background: none; border: 1px solid #fca5a5; border-radius: var(--radius); padding: 5px 16px; font-size: 0.8rem; font-family: inherit; font-weight: 500; color: #991b1b; cursor: pointer; transition: background 0.12s; }
        .error-msg .retry-btn:hover { background: #fee2e2; }
        .msg-execute-btn { display: inline-block; margin-top: 8px; margin-right: 4px; font-size: 0.72rem; font-weight: 600; color: var(--gray-500); cursor: pointer; background: none; border: 1px solid var(--gray-300); border-radius: var(--radius); padding: 4px 10px; transition: all 0.12s; font-family: inherit; }
        .msg-execute-btn:hover { background: var(--red); color: var(--white); border-color: var(--red); }
        .msg-speak-btn { display: inline-block; margin-top: 8px; font-size: 0.72rem; cursor: pointer; background: none; border: 1px solid var(--gray-300); border-radius: var(--radius); padding: 4px 10px; transition: all 0.12s; font-family: inherit; color: var(--gray-500); }
        .msg-speak-btn:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
        .mic-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-500); font-size: 1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
        .mic-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
        .mic-btn.recording { background: var(--red); color: var(--white); border-color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .activity-item { padding: 8px 16px; font-size: 0.75rem; color: var(--gray-600); border-bottom: 1px solid var(--gray-100); line-height: 1.4; }
        .activity-item .act-agent { font-weight: 600; color: var(--gray-800); }
        .activity-item .act-time { font-size: 0.65rem; color: var(--gray-400); margin-top: 2px; }
        .confidence-indicator { font-size: 0.7rem; color: var(--gray-400); margin-top: 2px; }
        .confidence-indicator .bar { display: inline-block; height: 4px; width: 40px; border-radius: 2px; margin-left: 4px; vertical-align: middle; background: var(--gray-200); }
        .confidence-indicator .bar .fill { height: 100%; border-radius: 2px; }
        .confidence-indicator .bar .fill.high { background: var(--green); }
        .confidence-indicator .bar .fill.medium { background: var(--amber); }
        .confidence-indicator .bar .fill.low { background: var(--red); }

        /* ── Mobile ── */
        .sidebar-toggle { display: none; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.3rem; cursor: pointer; padding: 4px; }
        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; top: 60px; left: 0; bottom: 0; z-index: 20; width: 280px; box-shadow: var(--shadow-md); }
            .sidebar.open { display: flex; }
            .sidebar-toggle { display: block; }
            .message { max-width: 90%; }
            .chat-messages { padding: 16px; }
            .input-area { padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-left">
            <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')" title="Conversations">&#9776;</button>
            <a href="/client/dashboard">&larr; Dashboard</a>
        </div>
        <div class="nav-center">
            <h2>{{ agent_name }} <span id="client-autonomy-badge" style="font-size:0.65rem;background:rgba(255,255,255,0.12);padding:1px 6px;border-radius:8px;color:rgba(255,255,255,0.6);vertical-align:middle;"></span></h2>
            <div class="sub">AI Marketing Agent</div>
        </div>
        <div class="nav-right">
            <span class="model-badge">AI</span>
        </div>
    </div>

<div class="chat-layout">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Conversations</span>
            <button class="new-btn" onclick="startNewChat()">+ New</button>
        </div>
        <div id="thread-list"></div>
        <div id="client-activity-section" style="display:none;border-top:1px solid var(--gray-200);">
            <div style="padding:10px 16px;font-size:0.75rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.04em;">&#9889; Activity</div>
            <div id="client-activity-list"></div>
        </div>
        <div class="sidebar-footer">
            <a href="/client/dashboard">&larr; Back to Dashboard</a>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-messages" id="chat-messages">
            <div class="empty-chat" id="empty-chat">
                <div class="icon">&#128172;</div>
                <p>Chat with <strong>{{ agent_name }}</strong></p>
                <p class="hint">Ask anything about your business marketing — your AI agent is here to help.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea id="msg-input" rows="1" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.ctrlKey){event.preventDefault();sendMessage()}"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">&#10148;</button>
            </div>
            <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">&#127908;</button>
            <div class="char-count" id="char-count"></div>
        </div>
    </div>
</div>

<script>
const AGENT_ID = '{{ agent_id }}';
const AGENT_NAME = '{{ agent_name }}';
let CURRENT_THREAD = null;
let LOADING = false;

const PLACEHOLDERS = {
    local_seo: "Ask your SEO agent anything about rankings, reviews, or local visibility...",
    social_media: "Ask your Social Media agent about posts, content, or engagement...",
    lead_conversion: "Ask your Lead agent about follow-ups, sequences, or conversions...",
    paid_ads: "Ask your Ads agent about campaigns, ad copy, or budget...",
    growth_hacker: "Ask your Growth agent about experiments, funnels, or new ideas...",
    reputation: "Ask your Reputation agent about reviews, responses, or your online image...",
    email_marketing: "Ask your Email agent about newsletters, sequences, or automations...",
    tiktok: "Ask your TikTok agent about scripts, hooks, or video ideas...",
    outreach: "Ask your Outreach agent about prospecting emails or campaigns...",
    backlinks: "Ask your Backlinks agent about link building or guest posts...",
};

document.getElementById('msg-input').placeholder = PLACEHOLDERS[AGENT_ID] || "Ask your AI agent anything...";

/* ── Utilities ── */
function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/* ── Threads ── */
async function loadThreads() {
    try {
        const r = await fetch('/api/agents/' + AGENT_ID + '/threads');
        if (!r.ok) return;
        const data = await r.json();
        const list = document.getElementById('thread-list');
        list.innerHTML = (data.threads || []).map(t =>
            `<div class="thread-item ${t.thread_id === CURRENT_THREAD ? 'active' : ''}" onclick="switchThread('${t.thread_id}')">
                <div class="preview">${escapeHtml((t.first_message || 'Chat').substring(0, 60))}</div>
                <div class="date">${t.started_at ? new Date(t.started_at).toLocaleDateString() : ''}</div>
            </div>`
        ).join('');
    } catch (e) {}
}

async function switchThread(threadId) {
    CURRENT_THREAD = threadId;
    document.querySelectorAll('.thread-item').forEach(el => el.classList.remove('active'));
    const el = document.querySelector(`[onclick*="switchThread('${threadId}')"]`);
    if (el) el.classList.add('active');
    document.getElementById('sidebar').classList.remove('open');
    await loadMessages(threadId);
    loadThreads();
}

async function loadMessages(threadId) {
    const container = document.getElementById('chat-messages');
    try {
        const r = await fetch('/api/agents/' + AGENT_ID + '/threads/' + threadId);
        if (!r.ok) throw new Error('Failed');
        const data = await r.json();
        const msgs = data.messages || [];
        container.innerHTML = '';
        if (msgs.length === 0) {
            container.appendChild(document.getElementById('empty-chat').cloneNode(true));
            return;
        }
        msgs.forEach(m => appendMessage(m.role, m.content, m.timestamp, false));
        container.scrollTop = container.scrollHeight;
    } catch (e) {
        container.innerHTML = '<div class="error-msg"><p>Couldn\'t load messages.</p><button class="retry-btn" onclick="switchThread(\'' + threadId + '\')">Try Again</button></div>';
    }
}

/* ── Messages ── */
function appendMessage(role, content, timestamp, scroll, meta) {
    if (scroll === undefined) scroll = true;
    const container = document.getElementById('chat-messages');
    const empty = container.querySelector('.empty-chat');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'message ' + role;
    const label = role === 'agent' ? `<div class="msg-label">${AGENT_NAME}</div>` : '';
    const ts = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : now();
    div.innerHTML = label + escapeHtml(content) + `<div class="time">${ts}</div>`;
    container.appendChild(div);

    if (role === 'agent' && content) {
        const execBtn = document.createElement('button');
        execBtn.className = 'msg-execute-btn';
        execBtn.textContent = '\u{1F680} Execute';
        execBtn.onclick = function(e) { executeAgentResponse(content); };
        div.appendChild(execBtn);
        const speakBtn = document.createElement('button');
        speakBtn.className = 'msg-speak-btn';
        speakBtn.textContent = '\u{1F50A} Speak';
        speakBtn.onclick = function(e) { speakText(content); };
        div.appendChild(speakBtn);
    }

    if (role === 'agent' && meta && meta.autonomy && meta.autonomy !== 'manual') {
        const ci = document.createElement('div');
        ci.className = 'confidence-indicator';
        const pct = Math.round((meta.confidence || 0) * 100);
        const cls = pct >= 80 ? 'high' : pct >= 50 ? 'medium' : 'low';
        ci.innerHTML = `<span style="text-transform:capitalize;">${meta.autonomy}</span> \u00B7 ${pct}% confident
            <span class="bar"><span class="fill ${cls}" style="width:${pct}%"></span></span>`;
        div.appendChild(ci);
    }

    if (scroll) container.scrollTop = container.scrollHeight;
}

function showTyping() {
    const container = document.getElementById('chat-messages');
    const empty = container.querySelector('.empty-chat');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

/* ── Send / New ── */
function startNewChat() {
    CURRENT_THREAD = null;
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-messages').appendChild(document.getElementById('empty-chat').cloneNode(true));
    document.querySelectorAll('.thread-item').forEach(el => el.classList.remove('active'));
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('msg-input').value = '';
    document.getElementById('msg-input').focus();
}

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || LOADING) return;

    LOADING = true;
    const btn = document.getElementById('send-btn');
    btn.disabled = true;

    appendMessage('user', text);
    input.value = '';
    updateCharCount();
    input.style.height = 'auto';
    showTyping();

    try {
        const r = await fetch('/api/agents/' + AGENT_ID + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, thread_id: CURRENT_THREAD })
        });
        const data = await r.json();
        hideTyping();

        if (data.error) {
            appendMessage('agent', "Sorry, the AI couldn't process that. Try rephrasing your request?");
        } else {
            CURRENT_THREAD = data.thread_id;
            appendMessage('agent', data.response, null, true, {
                autonomy: data.autonomy,
                confidence: data.confidence,
            });
            loadThreads();
            loadClientActivity();
        }
    } catch (e) {
        hideTyping();
        appendMessage('agent', 'Network error. Please check your connection and try again.');
    } finally {
        LOADING = false;
        btn.disabled = false;
    }
}

/* ── Execute Agent Response ── */
function executeAgentResponse(content) {
    if (!content) return alert('No content to execute.');
    if (!confirm('Send this response via MCP for publishing? It will be routed to the correct platform.')) return;

    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Sending...';

    fetch('/api/mcp/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent_id: AGENT_ID, content: content })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('Executed via MCP: ' + (data.result || 'Done'));
        } else {
            alert('Execution failed: ' + (data.error || 'Unknown error'));
        }
    })
    .catch(err => {
        alert('Network error: ' + err.message);
    })
    .finally(() => {
        btn.disabled = false;
        btn.textContent = '\u{1F680} Execute';
    });
}
    })
    .finally(() => {
        btn.disabled = false;
        btn.textContent = '\u{1F680} Execute';
    });
}

/* ── Char count ── */
function updateCharCount() {
    const len = document.getElementById('msg-input').value.length;
    document.getElementById('char-count').textContent = len > 200 ? len + '/2000' : '';
}

/* ── Speech (optional, browser-native with server fallback) ── */
let SPEECH_ENABLED = true;
let RECOGNITION = null;
let IS_RECORDING = false;
let MEDIA_RECORDER = null;
let AUDIO_CHUNKS = [];

function getLangCode() {
    return (document.documentElement.lang || 'en').substring(0, 2);
}
function getSpeechLang() {
    return getLangCode() === 'fr' ? 'fr-FR' : 'en-US';
}

function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    RECOGNITION = new SR();
    RECOGNITION.continuous = false;
    RECOGNITION.interimResults = false;
    RECOGNITION.lang = getSpeechLang();
    RECOGNITION.onresult = function(e) {
        document.getElementById('msg-input').value = e.results[0][0].transcript;
        IS_RECORDING = false;
        document.getElementById('mic-btn').classList.remove('recording');
        sendMessage();
    };
    RECOGNITION.onerror = function() { stopMic(); };
    RECOGNITION.onend = function() { stopMic(); };
}

function stopMic() {
    IS_RECORDING = false;
    const btn = document.getElementById('mic-btn');
    if (btn) btn.classList.remove('recording');
    if (MEDIA_RECORDER && MEDIA_RECORDER.state === 'recording') MEDIA_RECORDER.stop();
}

async function startServerSTT() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        AUDIO_CHUNKS = [];
        MEDIA_RECORDER = new MediaRecorder(stream);
        MEDIA_RECORDER.ondataavailable = function(e) {
            if (e.data.size > 0) AUDIO_CHUNKS.push(e.data);
        };
        MEDIA_RECORDER.onstop = async function() {
            const blob = new Blob(AUDIO_CHUNKS, { type: 'audio/webm' });
            const fd = new FormData();
            fd.append('audio', blob, 'recording.webm');
            fd.append('language', getLangCode());
            try {
                const r = await fetch('/api/speech/stt', { method: 'POST', body: fd });
                const d = await r.json();
                if (d.text) { document.getElementById('msg-input').value = d.text; sendMessage(); }
            } catch (e) { console.error('STT fallback failed'); }
            stream.getTracks().forEach(t => t.stop());
        };
        MEDIA_RECORDER.start();
        return true;
    } catch (e) { return false; }
}

async function toggleMic() {
    if (IS_RECORDING) { stopMic(); return; }
    IS_RECORDING = true;
    const btn = document.getElementById('mic-btn');
    btn.classList.add('recording');
    if (RECOGNITION) { try { RECOGNITION.lang = getSpeechLang(); RECOGNITION.start(); return; } catch (e) {} }
    const ok = await startServerSTT();
    if (!ok) stopMic();
}

function speakText(text) {
    if (!text || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = getLangCode() === 'fr' ? 'fr-FR' : 'en-US';
    u.rate = 1.0;
    window.speechSynthesis.speak(u);
}

initRecognition();

/* ── Autonomy & Activity (client) ── */
async function loadClientAutonomy() {
    try {
        const r = await fetch('/api/agents/' + AGENT_ID + '/autonomy');
        if (!r.ok) return;
        const d = await r.json();
        const badge = document.getElementById('client-autonomy-badge');
        if (badge && d.autonomy && d.autonomy !== 'manual') {
            badge.textContent = d.autonomy;
        }
    } catch (e) {}
}

async function loadClientActivity() {
    try {
        const r = await fetch('/api/orchestrator/activity?limit=10');
        if (!r.ok) return;
        const d = await r.json();
        const section = document.getElementById('client-activity-section');
        const list = document.getElementById('client-activity-list');
        if (!d.activities || d.activities.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        list.innerHTML = d.activities.map(a => {
            const time = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : '';
            return `<div class="activity-item">
                <span class="act-agent">${escapeHtml(a.agent || '?')}</span>
                ${a.confidence ? `<span style="font-size:0.65rem;color:var(--gray-400);">${Math.round(a.confidence * 100)}%</span>` : ''}
                <div style="font-size:0.7rem;color:var(--gray-500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(a.draft_preview || '')}</div>
                <div class="act-time">${time}</div>
            </div>`;
        }).join('');
    } catch (e) {}
}

/* ── Init ── */
document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    updateCharCount();
});

loadThreads();
loadClientAutonomy();
loadClientActivity();
setInterval(loadClientActivity, 15000);
</script>
