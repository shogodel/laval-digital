<div class="tab-content" id="tab-reports" role="tabpanel">
    <div class="topbar">
        <div><h1>Your Monthly Reports</h1></div>
    </div>

    <div class="card">
        <div class="card-header"><h2>Generate Your Monthly Report</h2><p>See exactly what Frankie did for your business this month</p></div>
        <div class="form-row">
            <div class="form-group">
                <label>Month</label>
                <select id="report-month">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year</label>
                <select id="report-year"></select>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;margin-top:4px;">
            <button class="btn btn-red" id="btn-generate-report">Generate Report</button>
            <button class="btn btn-green" id="email-report-btn" disabled>Email My Report</button>
            <button class="btn btn-gray" id="download-report-btn" disabled>Download PDF</button>
            <span id="report-result"></span>
        </div>
        <div id="last-report-info" style="font-size:0.78rem;color:var(--gray-400);margin-top:10px;"></div>
    </div>

    <div class="card" id="report-preview-card" style="display:none;">
        <div class="card-header">
            <h2>Report Preview</h2>
            <button class="btn btn-gray btn-sm" id="btn-print-report">Print</button>
        </div>
        <iframe id="report-preview" style="width:100%;height:600px;border:1px solid var(--gray-200);border-radius:var(--radius);background:var(--white);"></iframe>
    </div>

    <div class="card">
        <div class="card-header"><h2>Report History</h2><p>Previously generated reports</p></div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>Month</th><th>Generated</th><th>Actions</th></tr>
                </thead>
                <tbody id="report-history-table">
                    <tr><td colspan="3" class="empty">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script nonce="{{ csp_nonce }}">
let lastReportHtml = '';

function sanitizeHtml(html) {
    return html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
               .replace(/on\w+=["'][^"']*["']/gi, '');
}

function populateReportYears() {
    const sel = document.getElementById('report-year');
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;
    for (let y = currentYear; y >= currentYear - 3; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === currentYear) opt.selected = true;
        sel.appendChild(opt);
    }
    document.getElementById('report-month').value = currentMonth;
}

function generateReport() {
    const month = document.getElementById('report-month').value;
    const year = document.getElementById('report-year').value;

    const resultEl = document.getElementById('report-result');
    resultEl.innerHTML = '<span style="color:var(--blue);">Generating report...</span>';

    fetch('/api/analytics/report/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month: parseInt(month), year: parseInt(year) })
    })
    .then(r => r.json())
    .then(data => {
        if (data.html) {
            lastReportHtml = data.html;
            const preview = document.getElementById('report-preview');
            if (preview.src.startsWith('blob:')) URL.revokeObjectURL(preview.src);
            const blob = new Blob([data.html], { type: 'text/html' });
            preview.src = URL.createObjectURL(blob);
            document.getElementById('report-preview-card').style.display = 'block';
            document.getElementById('email-report-btn').disabled = false;
            document.getElementById('download-report-btn').disabled = false;
            resultEl.innerHTML = '<span style="color:var(--green);">Report generated successfully.</span>';
            updateLastReportInfo(month, year);
            fetch('/api/analytics/report/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ month: parseInt(month), year: parseInt(year), html: data.html })
            }).then(function() { loadReportHistory(); }).catch(function(e) { console.error(e); });
        } else {
            resultEl.innerHTML = '<span style="color:var(--red);">' + escapeHtml(data.error || 'Failed to generate report.') + '</span>';
        }
    })
    .catch(err => {
        resultEl.innerHTML = '<span style="color:var(--red);">Error: ' + escapeHtml(err.message) + '</span>';
    });
}

function updateLastReportInfo(month, year) {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const el = document.getElementById('last-report-info');
    el.textContent = 'Last report: ' + months[parseInt(month) - 1] + ' ' + year + ' (just generated)';
}

function emailReport() {
    const month = document.getElementById('report-month').value;
    const year = document.getElementById('report-year').value;
    const resultEl = document.getElementById('report-result');

    if (!lastReportHtml) return;

    resultEl.innerHTML = '<span style="color:var(--blue);">Sending email...</span>';

    fetch('/api/analytics/report/email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month: parseInt(month), year: parseInt(year), html: lastReportHtml })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            resultEl.innerHTML = '<span style="color:var(--green);">Report emailed successfully!</span>';
        } else {
            resultEl.innerHTML = '<span style="color:var(--red);">' + escapeHtml(data.error || 'Failed to send email.') + '</span>';
        }
    })
    .catch(err => {
        resultEl.innerHTML = '<span style="color:var(--red);">Error: ' + escapeHtml(err.message) + '</span>';
    });
}

function downloadReport() {
    if (!lastReportHtml) return;
    const blob = new Blob([lastReportHtml], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'frankie_report.html';
    a.click();
    URL.revokeObjectURL(a.href);
}

function printReport() {
    if (!lastReportHtml) return;
    const w = window.open('', '_blank');
    w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src \'none\'; style-src \'unsafe-inline\';"></head><body>');
    w.document.write(sanitizeHtml(lastReportHtml));
    w.document.write('</body></html>');
    w.document.close();
    w.onload = function() { w.print(); };
}

function loadReportHistory() {
    fetch('/api/analytics/reports/history')
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('report-history-table');
            const reports = data.reports || [];
            if (!reports.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty">No reports generated yet.</td></tr>';
                return;
            }
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            tbody.innerHTML = reports.map(r => {
                const label = months[r.month - 1] + ' ' + r.year;
                const genDate = r.created_at ? new Date(r.created_at).toLocaleDateString() : '—';
                return '<tr>'
                    + '<td><strong>' + label + '</strong></td>'
                    + '<td>' + genDate + '</td>'
                    + '<td>'
                    + '<a href="#" data-report-id="' + r.id + '" data-action="view" style="color:var(--blue);margin-right:8px;">View</a>'
                    + '<a href="#" data-report-id="' + r.id + '" data-action="download" style="color:var(--blue);margin-right:8px;">Download</a>'
                    + '<a href="#" data-report-id="' + r.id + '" data-action="email" style="color:var(--blue);">Email</a>'
                    + '</td>'
                    + '</tr>';
            }).join('');
        })
        .catch(() => {
            document.getElementById('report-history-table').innerHTML = '<tr><td colspan="3" class="empty">Failed to load history.</td></tr>';
        });
}

function viewHistoryReport(reportId) {
    fetch('/api/analytics/report/' + reportId)
        .then(r => r.json())
        .then(data => {
            if (data.html) {
                lastReportHtml = data.html;
                const preview = document.getElementById('report-preview');
                if (preview.src.startsWith('blob:')) URL.revokeObjectURL(preview.src);
                const blob = new Blob([data.html], { type: 'text/html' });
                preview.src = URL.createObjectURL(blob);
                document.getElementById('report-preview-card').style.display = 'block';
                document.getElementById('email-report-btn').disabled = false;
                document.getElementById('download-report-btn').disabled = false;
            }
        });
}

function downloadHistoryReport(reportId) {
    fetch('/api/analytics/report/' + reportId)
        .then(r => r.json())
        .then(data => {
            if (data.html) {
                const blob = new Blob([data.html], { type: 'text/html' });
                const a = document.createElement('a');
                const url = URL.createObjectURL(blob);
                a.href = url;
                a.download = 'frankie_report_' + reportId + '.html';
                a.click();
                URL.revokeObjectURL(url);
            }
        });
}

function emailHistoryReport(reportId) {
    fetch('/api/analytics/report/' + reportId + '/email', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert('Report emailed successfully!');
            } else {
                alert('Failed to send: ' + (data.error || 'Unknown error'));
            }
        });
}

document.getElementById('btn-generate-report').addEventListener('click', generateReport);
document.getElementById('email-report-btn').addEventListener('click', emailReport);
document.getElementById('download-report-btn').addEventListener('click', downloadReport);
document.getElementById('btn-print-report').addEventListener('click', printReport);
document.getElementById('report-history-table').addEventListener('click', function(e) {
    const link = e.target.closest('a[data-action]');
    if (!link) return;
    e.preventDefault();
    const id = link.dataset.reportId;
    const action = link.dataset.action;
    if (action === 'view') viewHistoryReport(id);
    else if (action === 'download') downloadHistoryReport(id);
    else if (action === 'email') emailHistoryReport(id);
});

populateReportYears();
loadReportHistory();
</script>
